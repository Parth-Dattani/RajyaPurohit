<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Jamnagar Rajyagor Samaj Portal">

  <!-- Mobile / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="rajya_purohit">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Rajyagor Jamnagar</title>

  <link rel="manifest" href="manifest.json">

  <!-- Gujarati font preload -->
  <link rel="preload"
        href="assets/assets/fonts/noto_sans_gujarati_regular.ttf"
        as="font"
        type="font/ttf"
        crossorigin>

  <link rel="preload"
        href="assets/assets/fonts/noto_sans_gujarati_bold.ttf"
        as="font"
        type="font/ttf"
        crossorigin>

  <style>
    @font-face {
      font-family: 'NotoSansGujarati';
      src: url('assets/assets/fonts/noto_sans_gujarati_regular.ttf')
           format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'NotoSansGujarati';
      src: url('assets/assets/fonts/noto_sans_gujarati_bold.ttf')
           format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #FFFDF9;
      font-family: 'NotoSansGujarati', sans-serif;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #FFFDF9;
      transition: opacity 0.25s ease;
      padding: 0 24px;
      text-align: center;
    }

    .splash-title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #E65100; /* AppColors.textOrange સીધો કલર */
      margin-bottom: 15px;
    }

    .splash-subtitle {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.5;
      color: #333333; /* AppColors.accentDark સીધો કલર */
    }

    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #E65100;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 35px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body.app-loaded #splash-screen {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="splash-screen">
  <div class="splash-title">મહાદેવ હર</div>
  <div class="splash-subtitle">આ જ્ઞાતિની ડિજિટલ પહેલ માં આપનું સ્વાગત છે.</div>
  <div class="loader"></div>
</div>

<script>
  window.addEventListener('flutter-first-frame', function () {
    document.body.classList.add('app-loaded');
  });

  // Fallback: hide splash after 4 sec
  setTimeout(function () {
    document.body.classList.add('app-loaded');
  }, 4000);
</script>

<!-- Flutter bootstrap -->
<script src="flutter_bootstrap.js" async></script>

</body>
</html>

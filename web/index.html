  <!-- ➔ ⚡ ૧. ફોન્ટ પ્રી-લોડ સર્વર પાથ લોક ભાઈ -->
  <link rel="preload" href="assets/assets/fonts/noto_sans_gujarati_regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/assets/fonts/noto_sans_gujarati_bold.ttf" as="font" type="font/ttf" crossorigin>

  <!--
    🔧 FIX #1: Renderer config.
    `window.flutterWebRenderer = "html"` is the OLD pre-3.22 API and is
    silently ignored by flutter_bootstrap.js. This is why CanvasKit was
    still downloading (the ~3 second delay + the OffscreenCanvas /
    surface.dart errors you saw in DevTools). The correct API for
    flutter_bootstrap.js is `window.flutterConfiguration`. MUST be set
    before the flutter_bootstrap.js <script> tag runs — placing it in
    <head> guarantees that.
  -->
  <script>
    window.flutterConfiguration = {
      renderer: "html"
    };
  </script>

  <style>
    /*
      🔧 FIX #2: bold weight font-face added.
      Previously only the regular weight was registered here, so any
      bold/heavy Gujarati text had no matching face for the browser to
      use — resulting in the tofu boxes (▯▯▯) you saw on headline text.
    */
    @font-face {
      font-family: 'NotoSansGujarati';
      src: url('assets/assets/fonts/noto_sans_gujarati_regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'NotoSansGujarati';
      src: url('assets/assets/fonts/noto_sans_gujarati_bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #FFFDF9; /* તમારો સ્પ્લેશ બેકગ્રાઉન્ડ કલર */
      font-family: sans-serif;
    }

    /*
      🔧 FIX #3: overlay-based splash instead of hiding `flutter-view`.
      The new flutter_bootstrap.js loader doesn't reliably create a
      `<flutter-view>` element to hide — that selector may match
      nothing, meaning the old splash trick wasn't actually hiding
      anything. This version instead draws the splash as a fixed
      full-screen overlay ON TOP of everything (high z-index), which
      works no matter how/where Flutter injects its DOM underneath.
    */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #FFFDF9;
      transition: opacity 0.25s ease;
    }

    .splash-text {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 4px;
      color: transparent;
      -webkit-text-stroke: 1.5px #E65100;
      margin-bottom: 20px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #E65100;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Fade out + remove from layout once Flutter's first frame is ready */
    body.app-loaded #splash-screen {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
<div id="splash-screen">
  <div class="splash-text">RAJYAGOR</div>
  <div class="loader"></div>
</div>

<!-- ➔ ⚡ OTP વિજેટ માટેની જગ્યા -->

<!DOCTYPE html>
<html>
<head>

  <!-- ➔ ⚡ ૧. ફોન્ટ પ્રી-લોડ સર્વર પાથ લોક ભાઈ -->
  <link rel="preload" href="assets/assets/fonts/noto_sans_gujarati_regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/assets/fonts/noto_sans_gujarati_bold.ttf" as="font" type="font/ttf" crossorigin>

  <style>
    @font-face {
      font-family: 'NotoSansGujarati';
      src: url('assets/assets/fonts/noto_sans_gujarati_regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* ➔ ⚡ ૨. જ્યાં સુધી ફ્લટર અને ફોન્ટ લોડ ન થાય ત્યાં સુધી ફ્લટર વ્યુ સાવ છુપાયેલો રહેશે ભાઈ */
    flutter-view {
      display: none !important;
    }

    /* ➔ ⚡ ૩. પ્યોર HTML/CSS વાળો મસ્ત સ્પ્લેશ સ્ક્રીનનો લોડર જુગાડ ભાઈ */
    body {
      margin: 0;
      padding: 0;
      background-color: #FFFDF9; /* તમારો સ્પ્લેશ બેકગ્રાઉન્ડ કલર */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ➔ ⚡ ૪. RAJYAGOR ટેક્સ્ટ માટે આઉટલાઇન સ્ટાઇલ લોક ભાઈ */
    .splash-text {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 4px;
      color: transparent;
      -webkit-text-stroke: 1.5px #E65100; /* તમારો ઓરેન્જ/ગોલ્ડન કલર */
      margin-bottom: 20px;
    }

    /* ➔ ⚡ ૫. મસ્ત પ્રોફેશનલ ગોળ ફરતું લોડર */
    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #E65100;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* જેવો ફ્લટર લોડ થઈ જશે એટલે આ ક્લાસથી સ્પ્લેશ ગાયબ થઈ જશે ભાઈ */
    .app-loaded .loading-container {
      display: none !important;
    }
    .app-loaded flutter-view {
      display: block !important;
    }
  </style>
</head>

<body>
<!-- ➔ ⚡ આ આપણો ઇન્સ્ટન્ટ લોડ થતો સ્પ્લેશ સ્ક્રીન છે ભાઈ, જે પેલા ચોકઠા ક્યારેય દેખાવા નહિ દે -->
<div class="loading-container" id="splash-screen">
  <div class="splash-text">RAJYAGOR</div>
  <div class="loader"></div>
</div>

<!-- ➔ ⚡ OTP વિજેટ માટેની જગ્યા (આને જ્યાં રાખવું હોય ત્યાં મૂકી શકાય) -->
<div id="otp-container"></div>

<script>
  window.flutterWebRenderer = "html";

  // ➔ ⚡ ⚡ સિક્રેટ સુપર જાદુ: ફ્લટરનું એન્જિન લોડ થાય ત્યારે સ્પ્લેશ હટાવવાની સિસ્ટમ
  window.addEventListener('flutter-first-frame', function () {
    // ફોન્ટ પણ લોડ થઈ ગયા હોય અને ફ્લટરની પહેલી ફ્રેમ રેડી થાય ત્યારે જ સ્પ્લેશ સ્ક્રીન ઉડશે ભાઈ!
    document.body.classList.add("app-loaded");
  });

  // સેફ સાઈડ બેકઅપ: જો ફ્રેમ ઇવેન્ટમાં સેજ વાર લાગે તો ૪ સેકન્ડ પછી ઓટોમેટિક ઓપન કરી દેશે
  setTimeout(function() {
    document.body.classList.add("app-loaded");
  }, 4000);
</script>

<script type="text/javascript">
